<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <style>
    body { margin: 0; padding: 0; background: #f4f6f9; font-family: 'Segoe UI', Arial, sans-serif; }
    .wrapper { max-width: 600px; margin: 40px auto; background: #ffffff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
    .header { background: linear-gradient(135deg, #6366f1, #8b5cf6); padding: 40px 32px; text-align: center; }
    .header h1 { color: #ffffff; margin: 0; font-size: 28px; letter-spacing: -0.5px; }
    .header p { color: rgba(255,255,255,0.85); margin: 8px 0 0; font-size: 15px; }
    .badge { display: inline-block; margin-top: 16px; padding: 6px 16px; background: rgba(255,255,255,0.2); color: #ffffff; border-radius: 20px; font-size: 13px; font-weight: 600; letter-spacing: 0.5px; }
    .body { padding: 40px 32px; }
    .body h2 { color: #1e1b4b; font-size: 22px; margin: 0 0 16px; }
    .body p { color: #4b5563; font-size: 15px; line-height: 1.7; margin: 0 0 16px; }
    .highlight-box { background: #f5f3ff; border-left: 4px solid #6366f1; border-radius: 6px; padding: 16px 20px; margin: 20px 0; }
    .highlight-box p { margin: 0; color: #4338ca; font-weight: 500; }
    .btn { display: inline-block; margin-top: 8px; padding: 14px 32px; background: linear-gradient(135deg, #6366f1, #8b5cf6); color: #ffffff; text-decoration: none; border-radius: 8px; font-size: 15px; font-weight: 600; }
    .footer { background: #f9fafb; padding: 24px 32px; text-align: center; border-top: 1px solid #e5e7eb; }
    .footer p { color: #9ca3af; font-size: 13px; margin: 0; }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="header">
      <h1>BidForge</h1>
      <p>Freelance Marketplace</p>
      <span class="badge" th:text="${badge}">Notification</span>
    </div>
    <div class="body">
      <h2 th:text="${heading}">Hello!</h2>
      <p th:text="${body}">Message goes here.</p>
      <div class="highlight-box" th:if="${highlight}">
        <p th:text="${highlight}">Highlighted info</p>
      </div>
      <p th:if="${subtext}" th:text="${subtext}">Additional info.</p>
      <a href="#" class="btn">View on BidForge</a>
    </div>
    <div class="footer">
      <p>© 2025 BidForge. All rights reserved.</p>
    </div>
  </div>
</body>
</html>
